<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header class="hdr">
    <img src="../icons/icon-32.png" alt="" width="20" height="20" />
    <h1>Sidebar Toggle</h1>
  </header>

  <section id="current" class="card" hidden>
    <div class="current-head">
      <span id="current-label" class="site-name"></span>
      <span id="current-host" class="host"></span>
    </div>
    <label class="row">
      <span class="row-label" id="hide-label">Hide on this site</span>
      <input type="checkbox" id="hide-toggle" class="switch" />
    </label>
    <label class="row" id="cinema-row" hidden>
      <span class="row-label">Cinema dim</span>
      <input type="checkbox" id="cinema-toggle" class="switch" />
    </label>
  </section>

  <section id="unsupported" class="card muted" hidden>
    This page isn't one of the supported sites.
  </section>

  <section class="sites">
    <h2>Active on</h2>
    <ul id="site-list"></ul>
  </section>

  <footer class="ftr">
    <kbd>Ctrl+Shift+E</kbd> hide &middot; <kbd>Alt+E</kbd> cinema
  </footer>

  <script src="../sites.js"></script>
  <script src="popup.js"></script>
</body>
</html>
